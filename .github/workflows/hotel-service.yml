name: hotel-service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/hotel-service/**"
      - "src/hotel-service-tests/**"
  pull_request:
    paths:
      - "src/hotel-service/**"
      - "src/hotel-service-tests/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hotel-service

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/hotel-service-tests/hotel-service-tests.csproj

      - name: Test
        run: dotnet test src/hotel-service-tests/hotel-service-tests.csproj --no-restore --logger "console;verbosity=minimal"

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src/hotel-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
