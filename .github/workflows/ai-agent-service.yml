name: ai-agent-service CI

on:
  push:
    branches: [master]
    paths:
      - "src/ai-agent-service/**"
      - "src/ai-agent-service-tests/**"
  pull_request:
    paths:
      - "src/ai-agent-service/**"
      - "src/ai-agent-service-tests/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/ai-agent-service-tests/ai-agent-service-tests.csproj

      - name: Test
        run: dotnet test src/ai-agent-service-tests/ai-agent-service-tests.csproj --no-restore --logger "console;verbosity=minimal"
