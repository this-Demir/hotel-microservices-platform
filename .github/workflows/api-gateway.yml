name: api-gateway CI

on:
  push:
    branches: [master]
    paths:
      - "src/api-gateway/**"
  pull_request:
    paths:
      - "src/api-gateway/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/api-gateway/ApiGateway.csproj

      - name: Build
        run: dotnet build src/api-gateway/ApiGateway.csproj --no-restore
